<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Boners</title>
    <link rel="icon" href="hdbmono.png" type="image/x-icon">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: "arial", monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
            position: relative;
        }

        /* --- DVD LOGO --- */
        #hdb-logo {
            position: absolute;
            width: 100px;
            height: 120px;
            z-index: 10;
            pointer-events: none;
            filter: hue-rotate(0deg) saturate(1) brightness(1);
            transition: filter 0.3s ease;
        }

        /* --- CLOCK --- */
        #clock {
            font-size: 8rem;
            font-weight: bold;
            margin-bottom: 2rem;
            letter-spacing: -3px;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            z-index: 2;
        }

        /* --- MAIN LINKS --- */
        .main-links {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            z-index: 2;
        }

        .link-card {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 500;
            border: 2px solid #2a2a2a;
            padding: 18px 35px;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            background: #1a1a1a;
            z-index: 3;
        }

        .link-card:hover {
            border-color: #4a4a4a;
            color: #fff;
            background-color: #252525;
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .service-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .service-icon svg { width: 100%; height: 100%; }

        /* --- COIN FLIP --- */
        .coin-container {
            width: 120px;
            height: 120px;
            margin-bottom: 3rem;
            cursor: pointer;
            perspective: 1000px; /* Essential for 3D effect */
            z-index: 5;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 3s cubic-bezier(0.2, 0.85, 0.32, 1.2); /* Bouncy ease */
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Hides back of element when rotated */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 4px solid #d4af37; /* Gold border */
        }

        /* HEADS */
        .side-heads {
            background-color: #1a1a1a;
            background-image: url('hdbmono.png');
            background-size: 70%;
            background-position: center;
            background-repeat: no-repeat;
            /* Rotate 0 degrees (default) */
        }

        /* TAILS */
        .side-tails {
            background-color: #d4af37; /* Gold coin color */
            transform: rotateY(180deg);
            color: #1a1a1a;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            border: 4px solid #b5952f;
        }
        
        .side-tails span {
            border: 2px solid #1a1a1a;
            padding: 20px 5px;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- JELLYFIN STATUS --- */
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #555;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-online { background-color: #00ff6a; box-shadow: 0 0 12px #00ff6a; animation: none; }
        .status-offline { background-color: #ff3b3b; box-shadow: 0 0 8px #ff3b3b; animation: none; }

        /* --- GAMES SECTION --- */
        .games-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            opacity: 0.7;
            transition: opacity 0.3s;
            background: #1a1a1a;
            padding: 20px 30px;
            border-radius: 16px;
            border: 2px solid #2a2a2a;
            z-index: 2;
        }

        .games-container:hover {
            opacity: 1;
            border-color: #333;
        }

        .games-header {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #999;
            margin-bottom: 10px;
        }

        .games-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px 30px;
            text-align: center;
        }

        .game-link {
            text-decoration: none;
            color: #b0b0b0;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            width: 180px;
            padding: 1px 1px;
            border-radius: 6px;
            transition: all 0.2s ease;
            background: transparent;
        }

        .game-link:hover {
            color: #fff;
            background: #252525;
            transform: translateX(4px);
        }

        @media (max-width: 1000px) {
            .games-list { grid-template-columns: repeat(2, 1fr); }
            #hdb-logo { width: 80px; height: 80px; }
            .main-links { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>

    <img id="hdb-logo" src="hdbmono.png" alt="HDB Mono Logo">

    <div id="clock">00:00</div>

    <div class="main-links">
        <a href="http://192.168.1.23:8096/" class="link-card">
            <div class="service-icon">
                <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="linear-gradient" gradientUnits="userSpaceOnUse" x1="110.25" y1="213.3" x2="496.14" y2="436.09">
                            <stop offset="0" style="stop-color:#AA5CC3"/>
                            <stop offset="1" style="stop-color:#00A4DC"/>
                        </linearGradient>
                    </defs>
                    <path d="M256,201.6c-20.4,0-86.2,119.3-76.2,139.4s142.5,19.9,152.4,0S276.5,201.6,256,201.6z" fill="url(#linear-gradient)"/>
                    <path d="M256,23.3c-61.6,0-259.8,359.4-229.6,420.1s429.3,60,459.2,0S317.6,23.3,256,23.3z M406.5,390.8c-19.6,39.3-281.1,39.8-300.9,0C85.8,351,215.7,115.5,256,115.5S426.1,351.4,406.5,390.8z" fill="url(#linear-gradient)"/>
                </svg>
            </div>
            <span id="jellyfin-status" class="status-dot"></span>
            Jellyfin
        </a>
        
        <a href="https://www.youtube.com" class="link-card">
            <div class="service-icon">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M23 9.71a8.5 8.5 0 0 0-.91-4.13 2.92 2.92 0 0 0-1.72-1A78.36 78.36 0 0 0 12 4.27a78.45 78.45 0 0 0-8.34.3 2.87 2.87 0 0 0-1.46.74c-.9.83-1 2.25-1.1 3.45a48.29 48.29 0 0 0 0 6.48 9.55 9.55 0 0 0 .3 2.12 3.14 3.14 0 0 0 .71 1.36 3.05 3.05 0 0 0 1.46.72 45.42 45.42 0 0 0 4.33.16h7.31a54.24 54.24 0 0 0 4.33-.16 2.9 2.9 0 0 0 1.53-.78 3.35 3.35 0 0 0 .68-1.36 9.55 9.55 0 0 0 .3-2.12 48.29 48.29 0 0 0-.01-4.77z" fill="#FF0000"/>
                    <path d="M9.75 15.02l5.75-3.27-5.75-3.27v6.54z" fill="#fff"/>
                </svg>
            </div>
            YouTube
        </a>
        
        <a href="https://mail.proton.me/" class="link-card">
            <div class="service-icon">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z" fill="#6d4aff"/>
                    <path d="M22 6l-10 7L2 6" stroke="#fff" stroke-width="2" fill="none"/>
                </svg>
            </div>
            Email
        </a>
    </div>

    <div class="coin-container" onclick="flipCoin()" title="Click to Flip">
        <div id="coin" class="coin">
            <div class="coin-face side-heads"></div>
            <div class="coin-face side-tails">
                <span>TAILS</span>
            </div>
        </div>
    </div>

    <div class="games-container">
        <div class="games-header"><a href="https://dles.aukspot.com/" class="game-link">Daily Games</a></div>
        <div class="games-list">
            <a href="https://scrandle.com/" class="game-link">Scrandle</a>
            <a href="https://flickle.app/" class="game-link">Flickle</a>
            <a href="https://www.nytimes.com/games/connections" class="game-link">Connections</a>
            <a href="https://www.geoguessr.com/" class="game-link">Geoguessr</a>
            <a href="https://bandle.app/" class="game-link">Bandle</a>
            <a href="https://www.foodguessr.com/" class="game-link">Foodguessr</a>
            <a href="https://catfishing.net/" class="game-link">Catfishing</a>
            <a href="https://www.vulture.com/article/daily-movie-grid-trivia-game-cinematrix.html" class="game-link">Cinematrix</a>
        </div>
    </div>

    <script>
        /* --- CLOCK --- */
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('clock').textContent = timeString;
        }

        /* --- COIN FLIP LOGIC --- */
        let currentCoinRotation = 0;
        let isFlipping = false;

        function flipCoin() {
            if(isFlipping) return;
            isFlipping = true;

            const coin = document.getElementById('coin');
            
            const sound = new Audio('coin.ogg');
            sound.volume = 0.5;
            sound.play().catch(e => console.log("Audio file missing or blocked")); // Graceful fail if no audio

            const isHeads = Math.random() < 0.5;
            
            const spins = 6; 
            const degreesPerSpin = 360;
            const extraSpins = spins * degreesPerSpin;
            
            const targetAngle = isHeads ? 0 : 180;
            
            const currentMod = currentCoinRotation % 360;
            
            let adjustment = targetAngle - currentMod;
            if (adjustment < 0) adjustment += 360;
            
            const totalRotation = extraSpins + adjustment;
            
            currentCoinRotation += totalRotation;
            
            coin.style.transform = `rotateY(${currentCoinRotation}deg)`;

            setTimeout(() => {
                isFlipping = false;
            }, 3000);
        }

        /* --- JELLYFIN PINGER --- */
        async function checkJellyfin() {
            const statusDot = document.getElementById('jellyfin-status');
            const jellyfinUrl = 'http://192.168.1.23:8096';
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                await fetch(jellyfinUrl + '/web/index.html', {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                statusDot.className = "status-dot status-online";
                
            } catch (error) {
                const testFrame = document.createElement('iframe');
                testFrame.style.display = 'none';
                testFrame.src = jellyfinUrl;
                
                let loaded = false;
                testFrame.onload = function() {
                    loaded = true;
                    statusDot.className = "status-dot status-online";
                    document.body.removeChild(testFrame);
                };
                
                setTimeout(() => {
                    if (!loaded) {
                        statusDot.className = "status-dot status-offline";
                        if (document.body.contains(testFrame)) document.body.removeChild(testFrame);
                    }
                }, 3000);
                
                document.body.appendChild(testFrame);
            }
        }

        /* --- BOUNCING LOGO LOGIC --- */
        class HDBCLogo {
            constructor() {
                this.logo = document.getElementById('hdb-logo');
                this.width = 120;
                this.height = 120;
                this.x = Math.random() * (window.innerWidth - this.width);
                this.y = Math.random() * (window.innerHeight - this.height);
                this.vx = (Math.random() > 0.5 ? 1 : -1) * 2.5;
                this.vy = (Math.random() > 0.5 ? 1 : -1) * 2.5;
                this.colors = [
                    'hue-rotate(0deg) saturate(1.2) brightness(1.1)',
                    'hue-rotate(90deg) saturate(1.2) brightness(1.1)',
                    'hue-rotate(180deg) saturate(1.2) brightness(1.1)',
                    'hue-rotate(270deg) saturate(1.2) brightness(1.1)',
                    'hue-rotate(45deg) saturate(1.5) brightness(1)',
                    'hue-rotate(135deg) saturate(1.5) brightness(1.2)',
                    'hue-rotate(225deg) saturate(1.3) brightness(0.9)',
                    'hue-rotate(315deg) saturate(1.4) brightness(1)'
                ];
                this.currentColorIndex = Math.floor(Math.random() * this.colors.length);
                this.updateColor();
                this.animate();
            }
            
            updateColor() { this.logo.style.filter = this.colors[this.currentColorIndex]; }
            
            animate() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x <= 0 || this.x + this.width >= window.innerWidth) {
                    this.vx = -this.vx;
                    this.changeColor();
                    this.x = this.x <= 0 ? 0 : window.innerWidth - this.width;
                }
                
                if (this.y <= 0 || this.y + this.height >= window.innerHeight) {
                    this.vy = -this.vy;
                    this.changeColor();
                    this.y = this.y <= 0 ? 0 : window.innerHeight - this.height;
                }
                
                this.logo.style.left = `${this.x}px`;
                this.logo.style.top = `${this.y}px`;
                requestAnimationFrame(() => this.animate());
            }
            
            changeColor() {
                let newIndex;
                do { newIndex = Math.floor(Math.random() * this.colors.length); } 
                while (newIndex === this.currentColorIndex && this.colors.length > 1);
                this.currentColorIndex = newIndex;
                this.updateColor();
            }
            
            handleResize() {
                if (this.x > window.innerWidth - this.width) this.x = window.innerWidth - this.width - 10;
                if (this.y > window.innerHeight - this.height) this.y = window.innerHeight - this.height - 10;
            }
        }
        
        let hdbLogo;
        function initHDBCLogo() { hdbLogo = new HDBCLogo(); }

        window.addEventListener('load', () => {
            updateClock();
            checkJellyfin();
            const logoImg = document.getElementById('hdb-logo');
            if (logoImg.complete) { initHDBCLogo(); } else { logoImg.onload = initHDBCLogo; }
        });
        
        window.addEventListener('resize', () => { if (hdbLogo) hdbLogo.handleResize(); });
        setInterval(updateClock, 1000);
        setInterval(checkJellyfin, 30000);
    </script>
</body>
</html>
