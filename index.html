<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Boners</title>
    <link rel="icon" href="hdbmono.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img id="hdb-logo" src="hdbmono.png" alt="HDB Mono Logo">

    <div id="clock">00:00</div>

    <div class="main-links">
        <a href="http://192.168.1.23:8096/" class="link-card" title="Jellyfin / LAN status">
            <div class="service-icon">
                <img src="jellyfin.svg" alt="">
            </div>
            <span id="jellyfin-status" class="status-dot"></span>
            Jellyfin
        </a>

        <a href="https://www.youtube.com" class="link-card">
            <div class="service-icon">
                <img src="youtube.svg" alt="">
            </div>
            YouTube
        </a>

        <a href="https://mail.proton.me/" class="link-card">
            <div class="service-icon">
                <img src="email.svg" alt="">
            </div>
            Email
        </a>
    </div>

    <div class="coin-container" id="coin-container" role="button" tabindex="0" aria-label="Flip coin" title="Click or press space to flip">
        <div class="coin-stage">
            <div id="coin" class="coin">
                <div class="coin-face side-heads"></div>
                <div class="coin-face side-tails"><span>TAILS</span></div>
            </div>
        </div>
        <div id="coin-shadow" class="coin-shadow"></div>
    </div>

    <div class="games-container">
        <div class="games-header">Daily Games</div>
        <div class="games-list">
            <a href="https://dles.aukspot.com/" class="game-link">Daily Games</a>
            <a href="https://scrandle.com/" class="game-link">Scrandle</a>
            <a href="https://flickle.app/" class="game-link">Flickle</a>
            <a href="https://www.nytimes.com/games/connections" class="game-link">Connections</a>
            <a href="https://www.geoguessr.com/" class="game-link">Geoguessr</a>
            <a href="https://bandle.app/" class="game-link">Bandle</a>
            <a href="https://www.foodguessr.com/" class="game-link">Foodguessr</a>
            <a href="https://catfishing.net/" class="game-link">Catfishing</a>
            <a href="https://timeguessr.com/" class="game-link">Timeguessr</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
